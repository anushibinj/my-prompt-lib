spring:
  application:
    name: my-prompt-lib
  datasource:
    url: jdbc:postgresql://localhost:5432/promptdb
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  flyway:
    table: mpl_schema_table
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

google:
  client-id: ${GOOGLE_CLIENT_ID:your-google-client-id-here}

# To show warnings and info
logging:
  level:
    root: INFO
    com.anushibinj.mypromptlib: DEBUG
