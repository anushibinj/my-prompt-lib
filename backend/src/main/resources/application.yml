spring:
  application:
    name: my-prompt-lib
  datasource:
    url: jdbc:postgresql://localhost:5432/promptdb
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# To show warnings and info
logging:
  level:
    root: INFO
    com.example.mypromptlib: DEBUG
